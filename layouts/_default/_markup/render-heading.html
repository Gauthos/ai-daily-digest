<h{{ .Level }} id="{{ .Anchor | safeURL }}" {{ if .Attributes.style }}style="{{ .Attributes.style | safeCSS }}"{{ end }}>
<div>
    <a href="#{{ .Anchor }}">
        {{ range seq 2 .Level}}#{{end}}
    </a>
    {{ .Text | safeHTML }}
    {{ if and (eq .Level 3) (hasPrefix .Anchor "item-") }}
    {{ $itemIndex := strings.TrimPrefix "item-" .Anchor }}
    {{ $dateStr := path.Base (strings.TrimSuffix "/" .Page.RelPermalink) }}
    <button class="share-item-btn"
            type="button"
            aria-label="分享此条"
            data-share-url="{{ printf "/share/%s/%s/" $dateStr $itemIndex | safeURL }}"
            data-share-id="{{ $itemIndex }}"
            data-title="{{ .Page.Title }}"
            data-item-title="{{ .PlainText }}"
            title="分享此条">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
    </button>
    {{ end }}
</div>
</h{{ .Level }}>

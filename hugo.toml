baseURL = "https://daily.choleraic.xyz/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "AI Daily Digest"
theme = "anubis2"

[pagination]
pagerSize = 10

[params.author]
name = "AI Daily Digest"

[params]
description = "AI 精选的每日技术博客摘要，来自 92 个顶级技术博客"
dateFormat = "2006-01-02"
paginationSinglePost = true
locale = "zh-cn"

[params.anubis2]
enableCopyCodeButton = true
enableSummary = true
enableReadMoreButton = true
enableRssIcon = true
enableColorThemeSwitcher = true
colorTheme = "auto"
openInNewTab = true
tocWordCount = 500
readNextPosts = 5

[params.anubis2.services.googleanalytics]
gtag = "G-07TGR64L5J"

socialIcons = [
    { id = "github", url = "https://github.com/Gauthos/ai-daily-digest" },
]

[taxonomies]

[[menu.main]]
identifier = "home"
name = "首页"
url = "/"
weight = 1

[[menu.main]]
identifier = "archive"
name = "归档"
url = "/posts/"
weight = 2

[markup]
defaultMarkdownHandler = 'goldmark'

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
codeFences = true
noClasses = true
style = 'catppuccin-frappe'
tabWidth = 4

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]

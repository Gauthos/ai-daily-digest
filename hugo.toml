baseURL = "https://daily.choleraic.xyz/"
defaultContentLanguage = "zh"
title = "AI Daily Digest"
theme = "anubis2"

[languages.zh]
locale = "zh-CN"

[pagination]
pagerSize = 10

[params]
description = "AI 精选的每日技术博客摘要，来自 90+ 个顶级技术博客"
dateFormat = "2006-01-02"
paginationSinglePost = true
mainSections = ["posts"]
ogImage = "https://test.fukit.cn/autoupload/en/Kuyc9NefcqCulKU7GTtlLP3MTivelVB1O1RJQrR1uEyyl5f0KlZfm6UsKj-HyTuv/20260501/gL6v/980X980/5a9458aafb53e86cba45aaaf99c88129.jpg"

[params.author]
name = "AI Daily Digest"
email = "support@daily.choleraic.xyz"

[params.anubis2]
enableCopyCodeButton = true
enableSummary = true
enableReadMoreButton = true
enableRssIcon = true
enableColorThemeSwitcher = false
colorTheme = "dark"
openInNewTab = true
tocWordCount = 500
readNextPosts = 5
socialIcons = [
    { id = "email", url = "mailto:support@daily.choleraic.xyz" },
    { id = "github", url = "https://github.com/Gauthos/ai-daily-digest" },
]

[params.footer]
copyrightText = "AI Daily Digest 2026. All Rights Reserved"
backToTopText = "Back to top"
barCount = 23

[[params.footer.leftLinks]]
label = "首页"
href = "/"

[[params.footer.leftLinks]]
label = "归档"
href = "/posts/"

[[params.footer.rightLinks]]
label = "Email"
href = "mailto:support@daily.choleraic.xyz"

[[params.footer.rightLinks]]
label = "GitHub"
href = "https://github.com/Gauthos/ai-daily-digest"

[[params.footer.rightLinks]]
label = "RSS"
href = "/index.xml"

[params.anubis2.services.googleanalytics]
gtag = "G-07TGR64L5J"

[taxonomies]

[[menu.main]]
identifier = "home"
name = "首页"
url = "/"
weight = 1

[[menu.main]]
identifier = "archive"
name = "归档"
url = "/posts/"
weight = 2

[markup]
defaultMarkdownHandler = 'goldmark'

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
codeFences = true
noClasses = true
style = 'catppuccin-frappe'
tabWidth = 4

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

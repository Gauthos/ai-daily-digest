<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Daily Digest</title>
  <meta name="description" content="AI-curated daily digest built from top technical blogs and published as a static RSS feed." />
  <link rel="alternate" type="application/rss+xml" title="AI Daily Digest" href="https://gauthos.github.io/ai-daily-digest/feed.xml" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #efe6d9 0%, #f6f3ec 100%);
      color: #1f1a17;
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(720px, calc(100% - 32px));
      background: rgba(255, 253, 247, 0.94);
      border: 1px solid #d8cfc1;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(57, 42, 31, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(30px, 6vw, 48px);
    }

    p {
      line-height: 1.65;
      color: #6a5f58;
    }

    a {
      color: #a94e2d;
    }

    code {
      background: #f3ede3;
      border-radius: 6px;
      padding: 0.08em 0.35em;
    }
  </style>
</head>
<body>
  <main>
    <h1>AI Daily Digest</h1>
    <p>GitHub Pages 已就绪，等待首次 GitHub Actions 运行生成 digest 内容。</p>
    <p>首次成功运行后，这里会展示最新日报，并同步更新 <a href="https://gauthos.github.io/ai-daily-digest/feed.xml"><code>feed.xml</code></a>。</p>
  </main>
</body>
</html>

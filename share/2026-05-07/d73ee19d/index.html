<!doctype html><html lang=zh-CN><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=referrer content="no-referrer-when-downgrade"><title>为何你的 Linux 发行版不再自动生成 SSH 主机密钥？ — AI Daily Digest</title><meta name=description content="传统 Linux 系统在检测到缺失 SSH 主机密钥时会自动生成，但 Fedora、RHEL 等近期发行版改变了这一行为，删除密钥后重启 sshd 或系统不再触发生成，导致服务启动失败。该变化源于 systemd 单元中对 sshd-keygen 服务条件的调整，可能出于安全考虑，避免意外生成非预期密钥。用户需手动执行 ssh-keygen -A 或修改 systemd 配置来重新生成密钥，系统管理员应更新运维流程以适配此变更。"><meta name=robots content="noindex,follow"><meta name=generator content="Hugo 0.161.1"><meta property="og:title" content="为何你的 Linux 发行版不再自动生成 SSH 主机密钥？"><meta property="og:description" content="传统 Linux 系统在检测到缺失 SSH 主机密钥时会自动生成，但 Fedora、RHEL 等近期发行版改变了这一行为，删除密钥后重启 sshd 或系统不再触发生成，导致服务启动失败。该变化源于 systemd 单元中对 sshd-keygen 服务条件的调整，可能出于安全考虑，避免意外生成非预期密钥。用户需手动执行 ssh-keygen -A 或修改 systemd 配置来重新生成密钥，系统管理员应更新运维流程以适配此变更。"><meta property="og:url" content="https://daily.choleraic.xyz/share/2026-05-07/d73ee19d/"><meta property="og:type" content="article"><meta property="og:site_name" content="AI Daily Digest"><meta property="og:image" content="https://test.fukit.cn/autoupload/en/Kuyc9NefcqCulKU7GTtlLP3MTivelVB1O1RJQrR1uEyyl5f0KlZfm6UsKj-HyTuv/20260501/gL6v/980X980/5a9458aafb53e86cba45aaaf99c88129.jpg"><meta name=twitter:card content="summary_large_image"><meta name=twitter:title content="为何你的 Linux 发行版不再自动生成 SSH 主机密钥？"><meta name=twitter:description content="传统 Linux 系统在检测到缺失 SSH 主机密钥时会自动生成，但 Fedora、RHEL 等近期发行版改变了这一行为，删除密钥后重启 sshd 或系统不再触发生成，导致服务启动失败。该变化源于 systemd 单元中对 sshd-keygen 服务条件的调整，可能出于安全考虑，避免意外生成非预期密钥。用户需手动执行 ssh-keygen -A 或修改 systemd 配置来重新生成密钥，系统管理员应更新运维流程以适配此变更。"><meta name=twitter:image content="https://test.fukit.cn/autoupload/en/Kuyc9NefcqCulKU7GTtlLP3MTivelVB1O1RJQrR1uEyyl5f0KlZfm6UsKj-HyTuv/20260501/gL6v/980X980/5a9458aafb53e86cba45aaaf99c88129.jpg"><link rel=canonical href=https://daily.choleraic.xyz/posts/2026-05-07/><script async src="https://www.googletagmanager.com/gtag/js?id=G-0

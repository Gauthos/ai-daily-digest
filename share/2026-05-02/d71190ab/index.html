<!doctype html><html lang=zh-CN><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=referrer content="no-referrer-when-downgrade"><title>服务器意外自行重启 — AI Daily Digest</title><meta name=description content="在整栋楼计划停电前，团队提前手动关闭了机房里所有服务器，却发现部分机器在无人操作的情况下自动重新启动。故障排查指向两类常见原因：BIOS 中“断电后恢复供电时自动开机”的设置，以及局域网中的 Wake-on-LAN 魔法包意外触发了启动。即使是手动 shutdown -h 命令，某些硬件或 IPMI 仍可能在交流电恢复时强制上电。结论是彻底断电前需检查 BIOS 电源管理策略，并物理断开网络或禁用 WoL 以防止意外复活。"><meta name=robots content="noindex,follow"><meta name=generator content="Hugo 0.161.1"><meta property="og:title" content="服务器意外自行重启"><meta property="og:description" content="在整栋楼计划停电前，团队提前手动关闭了机房里所有服务器，却发现部分机器在无人操作的情况下自动重新启动。故障排查指向两类常见原因：BIOS 中“断电后恢复供电时自动开机”的设置，以及局域网中的 Wake-on-LAN 魔法包意外触发了启动。即使是手动 shutdown -h 命令，某些硬件或 IPMI 仍可能在交流电恢复时强制上电。结论是彻底断电前需检查 BIOS 电源管理策略，并物理断开网络或禁用 WoL 以防止意外复活。"><meta property="og:url" content="https://daily.choleraic.xyz/share/2026-05-02/d71190ab/"><meta property="og:type" content="article"><meta property="og:site_name" content="AI Daily Digest"><meta property="og:image" content="https://test.fukit.cn/autoupload/en/Kuyc9NefcqCulKU7GTtlLP3MTivelVB1O1RJQrR1uEyyl5f0KlZfm6UsKj-HyTuv/20260501/gL6v/980X980/5a9458aafb53e86cba45aaaf99c88129.jpg"><meta name=twitter:card content="summary_large_image"><meta name=twitter:title content="服务器意外自行重启"><meta name=twitter:description content="在整栋楼计划停电前，团队提前手动关闭了机房里所有服务器，却发现部分机器在无人操作的情况下自动重新启动。故障排查指向两类常见原因：BIOS 中“断电后恢复供电时自动开机”的设置，以及局域网中的 Wake-on-LAN 魔法包意外触发了启动。即使是手动 shutdown -h 命令，某些硬件或 IPMI 仍可能在交流电恢复时强制上电。结论是彻底断电前需检查 BIOS 电源管理策略，并物理断开网络或禁用 WoL 以防止意外复活。"><meta name=twitter:image content="https://test.fukit.cn/autoupload/en/Kuyc9NefcqCulKU7GTtlLP3MTivelVB1O1RJQrR1uEyyl5f0KlZfm6UsKj-HyTuv/20260501/gL6v/980X980/5a9458aafb53e86cba45aaaf99c88129.jpg"><link rel=canonical href=https://daily.choleraic.xyz/posts/2026-05-02/><script async src="https://www.googletagmanager.com/gtag/js?id=G-07TGR64L5J"></script><script>window.dataLayer=window.dataLayer||[];functi

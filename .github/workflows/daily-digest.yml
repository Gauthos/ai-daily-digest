name: daily-digest

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Pacific/Honolulu

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check out current published site
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        continue-on-error: true
        with:
          ref: docs
          path: .published-docs
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.12"

      - name: Restore published site history
        run: |
          if [ -f .published-docs/manifest.json ] || [ -d .published-docs/digests ]; then
            rm -rf docs
            mkdir -p docs
            rsync -a --exclude='.git' .published-docs/ docs/
          fi

      - name: Generate digest markdown
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          mkdir -p .build
          bun scripts/digest.ts \
            --hours 48 \
            --top-n 15 \
            --lang zh \
            --output .build/digest.md

      - name: Build GitHub Pages files
        run: bun scripts/publish.ts --input .build/digest.md --output-dir docs --keep 30

      - name: Publish generated site to docs branch
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: docs
          folder: docs
          clean: true
          single-commit: true

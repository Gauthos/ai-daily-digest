name: daily-digest

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Pacific/Honolulu
      HUGO_VERSION: "0.161.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: true

      - name: Check out current published content
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        continue-on-error: true
        with:
          ref: hugo-content
          path: .published-content
          fetch-depth: 1

      - name: Restore published content history
        run: |
          mkdir -p content/posts static
          if [ -d .published-content/posts ]; then
            cp -r .published-content/posts/* content/posts/ 2>/dev/null || true
          fi
          if [ -f .published-content/static/search-index.json ]; then
            cp .published-content/static/search-index.json static/search-index.json
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.12"

      - name: Install dependencies
        run: bun install

      - name: Set up feed proxy
        if: ${{ secrets.XRAY_VLESS_URI != '' }}
        env:
          XRAY_VLESS_URI: ${{ secrets.XRAY_VLESS_URI }}
          XRAY_VERSION: "25.4.30"
        run: |
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v${XRAY_VERSION}/Xray-linux-64.zip" -O /tmp/xray.zip
          unzip -qo /tmp/xray.zip -d /tmp/xray
          chmod +x /tmp/xray/xray
          bun scripts/xray-config.ts "$XRAY_VLESS_URI" /tmp/xray-config.json
          /tmp/xray/xray run -config /tmp/xray-config.json &
          sleep 2
          echo "FEED_PROXY_URL=http://127.0.0.1:10809" >> "$GITHUB_ENV"

      - name: Set up Hugo
        env:
          HUGO_SHA256: "c89632f5bd7727746df2560313dc5dbeebef0a8823566c6479dbdd3c4f06aad9"
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          echo "${HUGO_SHA256}  hugo.deb" | sha256sum -c -
          sudo dpkg -i hugo.deb
          rm hugo.deb
          hugo version

      - name: Generate digest markdown
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          mkdir -p .build
          bun scripts/digest.ts \
            --hours 48 \
            --top-n 15 \
            --lang zh \
            --output .build/digest.md

      - name: Prepare Hugo content
        run: bun scripts/prepare-hugo.ts --input .build/digest.md

      - name: Build Hugo site
        run: hugo --minify --environment production

      - name: Publish site to docs branch
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: docs
          folder: public
          clean: true
          single-commit: true

      - name: Persist content to hugo-content branch
        run: |
          mkdir -p .persist
          cp -r content/posts .persist/
          mkdir -p .persist/static
          cp static/search-index.json .persist/static/ 2>/dev/null || true

      - name: Push persisted content
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: hugo-content
          folder: .persist
          clean: true
          single-commit: true

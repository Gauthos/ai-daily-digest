name: render

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'layouts/**'
      - 'assets/**'
      - 'themes/**'
      - 'scripts/retrofit-share.ts'
      - 'scripts/share-utils.ts'
      - 'scripts/prepare-hugo.ts'
      - 'scripts/types.ts'
      - 'hugo.toml'
      - '.github/workflows/render.yml'

permissions: {}

concurrency:
  group: render
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: America/Los_Angeles
      HUGO_VERSION: "0.161.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: true

      - name: Check out current published content
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: hugo-content
          path: .published-content
          fetch-depth: 1

      - name: Restore published content history
        run: |
          mkdir -p content/posts content/share static
          if [ -d .published-content/posts ]; then
            cp -r .published-content/posts/* content/posts/ 2>/dev/null || true
          fi
          if [ -d .published-content/share ]; then
            cp -r .published-content/share/* content/share/ 2>/dev/null || true
          fi
          if [ -f .published-content/static/search-index.json ]; then
            cp .published-content/static/search-index.json static/search-index.json
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.12"

      - name: Install dependencies
        run: bun install

      - name: Set up Hugo
        env:
          HUGO_SHA256: "c89632f5bd7727746df2560313dc5dbeebef0a8823566c6479dbdd3c4f06aad9"
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          echo "${HUGO_SHA256}  hugo.deb" | sha256sum -c -
          sudo dpkg -i hugo.deb
          rm hugo.deb
          hugo version

      - name: Retrofit share anchors and landing pages on existing posts
        run: bun scripts/retrofit-share.ts

      - name: Build Hugo site
        run: hugo --minify --environment production

      - name: Publish site to docs branch
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: docs
          folder: public
          clean: true
          single-commit: true

      - name: Persist content to hugo-content branch
        run: |
          mkdir -p .persist/static .persist/meta
          cp -r content/posts .persist/
          cp -r content/share .persist/ 2>/dev/null || true
          cp static/search-index.json .persist/static/ 2>/dev/null || true
          if [ -d .published-content/meta ]; then
            cp -r .published-content/meta/. .persist/meta/ 2>/dev/null || true
          fi

      - name: Push persisted content
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: hugo-content
          folder: .persist
          clean: true
          single-commit: true
